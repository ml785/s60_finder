name: Update Listings

# Runs automatically twice a day, or manually from the Actions tab.
on:
  schedule:
    - cron: "0 9,21 * * *"   # 9 AM and 9 PM UTC  (5 AM / 5 PM ET)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python3 scraper/scrape.py
        env:
          MARKETCHECK_API_KEY: ${{ secrets.MARKETCHECK_API_KEY }}

      - name: Commit and push if listings changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add listings.js
          if git diff --staged --quiet; then
            echo "No changes to listings.js — skipping commit."
          else
            COUNT=$(python3 -c "
import json, re
txt = open('listings.js').read()
m = re.search(r'const LISTINGS = (\[[\s\S]*?\]);', txt)
print(len(json.loads(m.group(1))) if m else '?')
")
            git commit -m "auto: ${COUNT} S60 listings near 07762 — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
